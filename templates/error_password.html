<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contraseña Incorrecta</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

:root{
    --gold:#D4AF37;
    --gold-light:#F5D67A;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#2c2c2c 0%,#111 40%,#050505 100%);

    overflow:hidden;
}
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(212,175,55,.12);
    filter:blur(60px);
    top:-200px;
    left:-100px;
}
body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:rgba(212,175,55,.08);
    filter:blur(60px);
    bottom:-150px;
    right:-100px;
}
.container{
    width:500px;
    padding:45px;
    text-align:center;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(212,175,55,.25);
    border-radius:25px;
    box-shadow:
    0 0 40px rgba(212,175,55,.15),
    0 20px 60px rgba(0,0,0,.5);
    z-index:2;
}
.logo{
    width:120px;
    margin-bottom:20px;
}
h1{
    color:var(--gold);
    margin-bottom:20px;
    font-size:32px;
}
p{
    color:white;
    line-height:1.6;
    margin-bottom:30px;
}
.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}
button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    background:
    linear-gradient(
        135deg,
        var(--gold),
        var(--gold-light)
    );
    color:#111;
    transition:.3s;
}
button:hover{
    transform:translateY(-3px);
}
</style>
</head>
<body>
<div class="container">
    <img
    src="https://fundacionkawsayta.org/wp-content/uploads/2022/04/UNACH-1024x1017.png"
    class="logo"
    alt="UNACH">
    <h1>Contraseña Incorrecta</h1>
    <p>
        La contraseña ingresada no coincide con la registrada
        para este usuario.
        <br><br>
        Puedes intentar nuevamente o recuperar tu acceso.
    </p>
    <div class="buttons">
        <button onclick="window.location.href='/'">
            Volver al Login
        </button>
        <button onclick="window.location.href='/recuperar'">
            Recuperar Acceso
        </button>
    </div>
</div>
</body>
</html>
