<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
:root{
    --gold:#D4AF37;
    --gold-light:#F5D67A;
    --black:#050505;
    --dark:#11151d;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
    background:
    radial-gradient(circle at top left,#353535 0%,#111 40%,#050505 100%);
}
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    background:rgba(212,175,55,.12);
    filter:blur(80px);
    top:-250px;
    left:-150px;
    animation:float1 10s infinite ease-in-out;
}
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(212,175,55,.10);
    filter:blur(80px);
    bottom:-200px;
    right:-150px;
    animation:float2 12s infinite ease-in-out;
}
@keyframes float1{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(50px);
}
}
@keyframes float2{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-50px);
}
}
.container{
    width:1000px;
    padding:40px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border-radius:30px;
    border:
    1px solid rgba(212,175,55,.25);
    box-shadow: 0 0 50px rgba(212,175,55,.15),
    0 30px 80px rgba(0,0,0,.6);
    text-align:center;
    animation:show .8s ease;
    z-index:5;
}
@keyframes show{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.logo{
    width:110px;
    filter:
    drop-shadow(
    0 0 20px rgba(212,175,55,.5)
    );
}
h1{
    margin-top:15px;
    color:var(--gold);
    font-size:32px;
    letter-spacing:1px;
}
p{
    color:#ddd;
    margin-top:10px;

}
.grid{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:18px;
}
.opcion{
    min-height:150px;
    padding:18px;
    border-radius:20px;
    cursor:pointer;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(212,175,55,.25);
    transition:.35s;
    box-shadow:
    inset 0 0 20px rgba(255,255,255,.03);
}
.opcion:hover{
    transform:
    translateY(-8px)
    scale(1.05);
    border-color:var(--gold);
    box-shadow:
    0 15px 35px rgba(212,175,55,.35);
}
.emoji{
    font-size:60px;
    filter:
    drop-shadow(
    0 0 15px rgba(212,175,55,.35)
    );
}
.texto{
    margin-top:15px;
    color:white;
    font-weight:700;
    font-size:16px;
}
.imagen-final{
    margin-top:30px;
    width:120px;
    filter:
    drop-shadow(
    0 0 20px rgba(212,175,55,.4)
    );
}
</style>
</head>
<body>
<div class="container">
<img
src="https://fundacionkawsayta.org/wp-content/uploads/2022/04/UNACH-1024x1017.png"
class="logo">
<h1>
Seleccione su palabra de seguridad
</h1>
<p>
Elija la palabra correcta
</p>
<div id="grid" class="grid"></div>
<img
class="imagen-final"
src="https://fundacionkawsayta.org/wp-content/uploads/2022/04/UNACH-1024x1017.png">
</div>
<script>
const palabraCorrecta = "{{ palabra }}";
let palabras = [
"Electromagnetismo",
"Arquitectura",
"Transparencia",
"Metamorfosis",
"Constelación",
"Perseverancia",
"Investigación",
"Conocimiento",
"Imaginación",
"Creatividad",
"Desarrollo",
"Programación",
"Algoritmo",
"Seguridad",
"Autenticación",
"Biodiversidad",
"Geometría",
"Fotografía",
"Astronomía",
"Tecnología"
];
palabras = palabras.filter(
p => p !== palabraCorrecta
);
palabras = palabras.slice(0,19);
palabras.push(palabraCorrecta);
palabras.sort(
()=>Math.random()-0.5
);
let imagenes=[
"🍕",
"🚗",
"🌋",
"📱",
"🧬",
"🎮",
"🏛️",
"🌌",
"🔬",
"🎨",
"🚀",
"🎧",
"⚽",
"🌊",
"🦊",
"🍜",
"🚲",
"📖",
"🎭",
"🧠"
];
imagenes.sort(
()=>Math.random()-0.5
);
const grid =
document.getElementById("grid");
palabras.forEach((texto,index)=>{
let cuadro =
document.createElement("div");
cuadro.className="opcion";
cuadro.innerHTML = `
<div class="emoji">
${imagenes[index]}
</div>
<div class="texto">
${texto}
</div>
`;
cuadro.onclick = ()=>{
verificarPalabra(texto);
};
grid.appendChild(cuadro);
});
async function verificarPalabra(palabra){
const res = await fetch(
"/verificar_palabra",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
palabra:palabra
})
});
const data =
await res.json();
if(data.success){
alert("Acceso concedido");
window.location.href="/perfil";
}else{
alert("Palabra incorrecta");
}
}
</script>
</body>
</html>
